name: Daily news digest

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC = 7am EDT (6am EST after DST ends)
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # needed to commit the dated digest back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO:   ${{ secrets.SMTP_TO }}
        run: |
          mkdir -p digests
          python digest.py --email --output-dir digests --quiet

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: digests/*.md

      - name: Commit digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/*.md
          if ! git diff --cached --quiet; then
            git commit -m "digest: $(date -u +%Y-%m-%d)"
            git push
          fi
