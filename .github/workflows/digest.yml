name: Daily news digest

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC daily
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # needed to commit the dated digest back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p digests
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python digest.py --ai --output-dir digests --quiet
          else
            python digest.py --output-dir digests --quiet
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: digests/*.md

      - name: Commit digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/*.md
          if ! git diff --cached --quiet; then
            git commit -m "digest: $(date -u +%Y-%m-%d)"
            git push
          fi
